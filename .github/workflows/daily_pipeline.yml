name: Update Daily News AI

on:
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 00:00 (한국 시간 오전 9시)
  workflow_dispatch: # 필요할 때 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests newspaper3k openai lxml_html_clean

      - name: Run AI Pipeline
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/pipeline.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "NewsBot"
          git config --global user.email "bot@github.com"
          git add docs/data/*.json
          git commit -m "Update daily news with AI summaries" || echo "No changes to commit"
          git push

      - name: Commit and Push changes
      run: |
        git config --global user.name "NewsBot"
        git config --global user.email "bot@github.com"
        git add docs/data/  # 특정 파일이 아닌 data 폴더 전체를 add
        git commit -m "Add news for $(date +'%Y-%m-%d')" || echo "No changes"
        git push
