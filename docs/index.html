<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News: Multi-Level Summary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>AI News Summarizer</h1>
            <p>초·중·고 수준별 맞춤형 뉴스 요약 서비스</p>
            <div class="search-container">
                <input type="text" id="interestInput" placeholder="관심 있는 주제를 입력하세요 (예: 우주 개발, AI의 미래)">
                <button onclick="handleSearch()" id="searchBtn">AI 시맨틱 검색</button>
            </div>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="loadCategory('general', this)">전체</button>
        <button class="tab-btn" onclick="loadCategory('technology', this)">테크</button>
        <button class="tab-btn" onclick="loadCategory('science', this)">과학</button>
        <button class="tab-btn" onclick="loadCategory('business', this)">비즈니스</button>
    </nav>

    <main id="results-container" class="news-grid">
        </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modal-title">뉴스 제목</h2>
                <div class="level-selector">
                    <button id="btn-elementary" class="level-btn" onclick="updateSummaryLevel('elementary')">초등 수준</button>
                    <button id="btn-middle" class="level-btn" onclick="updateSummaryLevel('middle')">중등 수준</button>
                    <button id="btn-high" class="level-btn" onclick="updateSummaryLevel('high')">고등 수준</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="summary-text" class="summary-box">
                    </div>
            </div>
            <div class="modal-footer">
                <a id="modal-link" target="_blank" class="origin-link">원문 기사 보러가기</a>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
