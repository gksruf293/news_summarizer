name: Build Everything Embeddings

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 03:00

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run embedding builder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python src/build_everything_embeddings.py

      - name: Commit and push embeddings
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/data/everything_embeddings.json
          git commit -m "Update everything embeddings"
          git push
